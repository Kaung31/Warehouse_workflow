services:
  postgres:
    image: postgres:16-alpine
    container_name: scooter-hub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: scooter
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: scooterhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: